
{{- $values := (tpl (.Values | toYaml) $) | fromYaml }}
{{- $values := (tpl ($values | toYaml) $) | fromYaml }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    {{- range $key, $val := $values.manager.labels }}
    {{ $key }}: {{ $val | quote }}
    {{- end}}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "chalkular.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    control-plane: controller-manager
  name: {{ include "chalkular.resourceName" (dict "suffix" "controller-manager" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ $values.manager.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "chalkular.name" . }}
      control-plane: controller-manager
  template:
    metadata:
      annotations:
        {{- range $key, $val := $values.manager.annotations }}
        {{ $key }}: {{ $val | quote }}
        {{- end}}
        kubectl.kubernetes.io/default-container: manager
      labels:
        {{- range $key, $val := $values.manager.labels }}
        {{ $key }}: {{ $val | quote }}
        {{- end}}
        app.kubernetes.io/name: {{ include "chalkular.name" . }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        control-plane: controller-manager
    spec:
      {{- with $values.manager.tolerations }}
      tolerations: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with $values.manager.nodeSelector }}
      nodeSelector: {{ toYaml . | nindent 10 }}
      {{- end }}
      {{- with $values.manager.affinity }}
      affinity: {{ toYaml . | nindent 10 }}
      {{- end }}
      containers:
      - args:
        {{- if $values.intake.rejectReportPipelineThreshold }}
        - --reject-report-pipeline-threshold={{ $values.intake.rejectReportPipelineThreshold }}
        {{- end }}
        {{- if $values.intake.maxPipelinesPerPolicy }}
        - --max-pipelines-per-policy={{ $values.intake.maxPipelinesPerPolicy }}
        {{- end }}
        {{- if $values.intake.sqs.enable}}
        - --sqs-queue-url={{ $values.intake.sqs.queueURL }}
        - --sqs-parser={{ $values.intake.sqs.parser }}
        {{- end }}
        {{- if $values.intake.http.enable}}
        - --report-http-bind-address=:{{ $values.intake.http.port }}
        - --report-http-secure={{ $values.intake.http.secure }}
        {{- if $values.intake.http.secure }}
        - --report-http-cert-path={{ $values.intake.http.cert.path }}
        - --report-http-cert-name={{ $values.intake.http.cert.name }}
        - --report-http-cert-key={{ $values.intake.http.cert.key }}
        {{- end }}
        {{- end }}
        {{- if $values.metrics.enable }}
        - --metrics-bind-address=:{{ $values.metrics.port }}
        {{- else }}
        # Bind to :0 to disable the controller-runtime managed metrics server
        - --metrics-bind-address=0
        {{- end }}
        - --health-probe-bind-address=:8081
        {{- range $values.manager.args }}
        - {{ . }}
        {{- end }}
        {{- if and $values.certManager.enable $values.metrics.enable }}
        - --metrics-cert-path=/tmp/k8s-metrics-server/metrics-certs
        {{- end }}
        {{- if $values.certManager.enable }}
        - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
        {{- end }}
        command:
        - /entrypoint
        env:
          {{- if $values.manager.env }}
          {{- toYaml $values.manager.env | nindent 8 }}
          {{- else}}
          []
          {{- end}}
        image: "{{ $values.manager.image.repository }}:{{ $values.manager.image.tag }}"
        imagePullPolicy: {{ $values.manager.image.pullPolicy }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
        name: manager
        ports:
        - containerPort: {{ $values.webhook.port }}
          name: webhook-server
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- if $values.manager.resources }}
          {{- toYaml $values.manager.resources | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        securityContext:
          {{- if $values.manager.securityContext }}
          {{- toYaml $values.manager.securityContext | nindent 10 }}
          {{- else }}
          {}
          {{- end }}
        volumeMounts:
          {{- if $values.manager.volumeMounts }}
          {{- toYaml $values.manager.volumeMounts | nindent 8}}
          {{- end}}
        {{- if and $values.certManager.enable $values.metrics.enable }}
        - mountPath: /tmp/k8s-metrics-server/metrics-certs
          name: metrics-certs
          readOnly: true
        {{- end }}
        {{- if $values.certManager.enable }}
        - mountPath: /tmp/k8s-webhook-server/serving-certs
          name: webhook-certs
          readOnly: true
        {{- end }}
      securityContext:
        {{- if $values.manager.podSecurityContext }}
        {{- toYaml $values.manager.podSecurityContext | nindent 8 }}
        {{- else }}
        {}
        {{- end }}
      serviceAccountName: {{ include "chalkular.resourceName" (dict "suffix" "controller-manager" "context" $) }}
      terminationGracePeriodSeconds: 10
      volumes:
        {{- if $values.manager.volumes }}
        {{- toYaml $values.manager.volumes | nindent 6}}
        {{- end}}
      {{- if and $values.certManager.enable $values.metrics.enable }}
      - name: metrics-certs
        secret:
          items:
          - key: ca.crt
            path: ca.crt
          - key: tls.crt
            path: tls.crt
          - key: tls.key
            path: tls.key
          optional: false
          secretName: metrics-server-cert
      {{- end }}
      {{- if $values.certManager.enable }}
      - name: webhook-certs
        secret:
          secretName: webhook-server-cert
      {{- end }}
