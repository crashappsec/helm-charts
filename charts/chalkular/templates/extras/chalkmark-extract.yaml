
{{- $values := (tpl (.Values | toYaml) $) | fromYaml }}
{{- $values := (tpl ($values | toYaml) $) | fromYaml }}
---
apiVersion: ocular.crashoverride.run/v1beta1
kind: ClusterDownloader
metadata:
  name: {{ include "chalkular.resourceName" (dict "suffix" "chalkmark-extract" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  container:
    env: []
    image: {{ $values.downloader.image.repository }}:{{ $values.downloader.image.tag }}
    imagePullPolicy: {{ $values.downloader.image.pullPolicy }}
    name: chalkmark-extract
    volumeMounts: []
  metadataFiles:
  - chalk.json
  parameters:
  - default: ""
    description: Which platform to download for the image
    name: PLATFORM
  - default: ""
    description: If set to a non-empty value, registry connection uses http
    name: INSECURE_REGISTRY
  volumes: []
