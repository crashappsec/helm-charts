{{- if .Values.intake.http.enable }}
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: {{ include "chalkular.name" . }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version | replace "+" "_" }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    control-plane: controller-manager
  name: {{ include "chalkular.resourceName" (dict "suffix" "report-http" "context" $) }}
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: https
    port: {{ .Values.intake.http.port }}
    protocol: TCP
    targetPort: {{ .Values.intake.http.port }}
  selector:
    app.kubernetes.io/name: {{ include "chalkular.name" . }}
    control-plane: controller-manager

{{- end}}